<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geopolitical Shifts in the Indo-Pacific: Emerging Alliances and Strategic Challenges · Drishvara</title>
  <meta name="description" content="Navigating evolving power dynamics in a pivotal region" />
  <link rel="icon" type="image/png" href="../../assets/logo/logo.png" />
  <style>
    :root {
      --bg-1: #08142d;
      --bg-2: #12254a;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f5f1e8;
      --text-soft: #d7deea;
      --text-muted: #9aa8bc;
      --gold: #c9a24a;
      --gold-soft: rgba(201, 162, 74, 0.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 50% 14%, rgba(201, 162, 74, 0.08), transparent 18%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.04), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 20px 64px;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 8px 0 34px;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--text-soft);
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: var(--gold);
    }

    .article-shell {
      max-width: 820px;
      margin: 0 auto;
    }

    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, var(--gold-soft) 0%, rgba(201, 162, 74, 0.04) 42%, transparent 72%);
      filter: blur(10px);
      border-radius: 50%;
      z-index: 0;
    }

    .logo {
      position: relative;
      z-index: 1;
      width: 64px;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 8px rgba(201, 162, 74, 0.16));
    }

    .meta {
      text-align: center;
      color: var(--gold);
      font-size: 0.95rem;
      margin: 4px 0 14px;
      letter-spacing: 0.2px;
    }

    h1 {
      text-align: center;
      margin: 0 0 16px;
      font-size: clamp(2.3rem, 4.8vw, 4rem);
      line-height: 1.08;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 28px;
      color: var(--text-soft);
      font-size: 1.08rem;
      line-height: 1.9;
    }

    .divider {
      width: 86px;
      height: 1px;
      margin: 0 auto 30px;
      background: linear-gradient(to right, transparent, rgba(201, 162, 74, 0.95), transparent);
    }

    .article-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      backdrop-filter: blur(6px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .article-body p {
      margin: 0 0 18px;
      color: var(--text-muted);
      line-height: 1.95;
      font-size: 1.05rem;
    }

    .article-body h2 {
      margin: 28px 0 14px;
      font-size: 1.55rem;
      color: var(--text-main);
      line-height: 1.2;
    }

    .article-body blockquote {
      margin: 24px 0;
      padding: 16px 18px;
      border-left: 3px solid rgba(201, 162, 74, 0.65);
      background: rgba(201, 162, 74, 0.04);
      color: var(--text-soft);
      font-style: italic;
      line-height: 1.85;
      border-radius: 8px;
    }

    .back-row {
      text-align: center;
      margin-top: 26px;
    }

    .back-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.98rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 56px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .page {
        padding: 20px 16px 46px;
      }

      .nav {
        gap: 18px;
        padding-bottom: 26px;
      }

      .subtitle,
      .article-body p {
        font-size: 1rem;
      }

      .article-body {
        padding: 24px;
      }
    }
  </style>

  <style id="drishvara-typography-final-pass">
    body {
      overflow-x: hidden;
    }

    h1 {
      max-width: 1000px !important;
      font-size: clamp(1.9rem, 3vw, 2.75rem) !important;
      line-height: 1.12 !important;
      letter-spacing: -0.02em !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    article,

    p,

      line-height: 1.86 !important;

      text-justify: inter-word !important;
      hyphens: auto !important;
    }

    h2,

      max-width: 900px !important;

      display: block !important;
      margin-left: auto !important;
      margin-right: auto !important;

    figcaption,

      font-family: Arial, Helvetica, sans-serif !important;
      font-size: 0.82rem !important;
      line-height: 1.5 !important;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: clamp(1.62rem, 7vw, 2.15rem) !important;
      }

      p,
      li {
        text-align: left !important;

      }

      }
    }
