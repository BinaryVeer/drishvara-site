<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Theme emphasis in this article</title>
  <desc id="desc">Horizontal bar chart showing deterministic theme counts for digital access, service delivery, data visibility, and trust and accountability in the article text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef6f9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4480A8"/>
      <stop offset="100%" stop-color="#1A738C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1A738C" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:34px;font-weight:700;fill:#17324d}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:500;fill:#4a6070}
      .label{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#17324d}
      .value{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:800;fill:#1A738C}
      .note{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:600;fill:#607685}
      .axis{stroke:#B6D0E9;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="145" fill="#B6D0E9" opacity="0.20"/>
  <circle cx="130" cy="612" r="150" fill="#4480A8" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="58" y="58" width="1084" height="604" rx="30" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
  </g>

  <text x="88" y="116" class="title">Theme emphasis in this article</text>
  <text x="90" y="150" class="subtitle">Deterministic count of selected theme terms in the article text</text>

  <line x1="285" y1="156" x2="285" y2="560" class="axis"/>
  
    <text x="90" y="203" class="label">Digital access</text>
    <rect x="285" y="178" width="650" height="38" rx="19" fill="#E0E0E0" opacity="0.72"/>
    <rect x="285" y="178" width="624" height="38" rx="19" fill="url(#bar)"/>
    <text x="927" y="204" class="value">72</text>
  

    <text x="90" y="295" class="label">Service delivery</text>
    <rect x="285" y="270" width="650" height="38" rx="19" fill="#E0E0E0" opacity="0.72"/>
    <rect x="285" y="270" width="650" height="38" rx="19" fill="url(#bar)"/>
    <text x="953" y="296" class="value">75</text>
  

    <text x="90" y="387" class="label">Data visibility</text>
    <rect x="285" y="362" width="650" height="38" rx="19" fill="#E0E0E0" opacity="0.72"/>
    <rect x="285" y="362" width="243" height="38" rx="19" fill="url(#bar)"/>
    <text x="546" y="388" class="value">28</text>
  

    <text x="90" y="479" class="label">Trust &amp; accountability</text>
    <rect x="285" y="454" width="650" height="38" rx="19" fill="#E0E0E0" opacity="0.72"/>
    <rect x="285" y="454" width="156" height="38" rx="19" fill="url(#bar)"/>
    <text x="459" y="480" class="value">18</text>
  

  <rect x="88" y="590" width="1018" height="44" rx="16" fill="#F7FAFC" stroke="#B6D0E9"/>
  <text x="112" y="618" class="note">Source: deterministic article-text count of selected theme terms. Counts indicate article emphasis only, not public-health statistics.</text>
</svg>
