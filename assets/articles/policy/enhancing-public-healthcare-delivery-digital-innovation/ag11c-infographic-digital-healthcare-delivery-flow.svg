<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">How digital innovation supports public healthcare delivery</title>
  <desc id="desc">Four-step infographic showing digital touchpoint, information capture, service response and trust loop in public healthcare delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef6f9"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4480A8"/>
      <stop offset="100%" stop-color="#1A738C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1A738C" flood-opacity="0.13"/>
    </filter>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:32px;font-weight:800;fill:#17324d}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:500;fill:#4a6070}
      .blockTitle{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:#17324d}
      .badge{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:900;fill:#ffffff}
      .note{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:600;fill:#607685}
    </style>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1070" cy="116" r="140" fill="#B6D0E9" opacity="0.20"/>
  <circle cx="150" cy="610" r="155" fill="#4480A8" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="58" y="58" width="1084" height="604" rx="30" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
  </g>

  <text x="88" y="116" class="title">How digital innovation supports public healthcare delivery</text>
  <text x="90" y="150" class="subtitle">A compact conceptual flow derived from the article’s governance and service-delivery themes</text>

  <rect x="88" y="190" width="1018" height="54" rx="18" fill="#F7FAFC" stroke="#B6D0E9"/>
  <text x="112" y="224" class="note">Purpose: explain the article’s digital public-service pathway without inventing statistics or official process claims.</text>

  
    <g>
      <rect x="96" y="250" width="198" height="180" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
      <circle cx="144" cy="298" r="28" fill="url(#badge)"/>
      <text x="144" y="307" text-anchor="middle" class="badge">01</text>
      <text x="124" y="352" class="blockTitle">Digital touchpoint</text>
      <foreignObject x="124" y="368" width="142" height="54">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:13px;line-height:1.35;color:#4a6070;">Access begins through a visible service channel.</div>
      </foreignObject>
      <path d="M286 332 C 314 332, 326 332, 348 332" stroke="#1A738C" stroke-width="5" stroke-linecap="round" fill="none"/>
       <path d="M342 316 L366 332 L342 348" stroke="#1A738C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  

    <g>
      <rect x="356" y="250" width="198" height="180" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
      <circle cx="404" cy="298" r="28" fill="url(#badge)"/>
      <text x="404" y="307" text-anchor="middle" class="badge">02</text>
      <text x="384" y="352" class="blockTitle">Information capture</text>
      <foreignObject x="384" y="368" width="142" height="54">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:13px;line-height:1.35;color:#4a6070;">Needs, feedback and service status are structured.</div>
      </foreignObject>
      <path d="M546 332 C 574 332, 586 332, 608 332" stroke="#1A738C" stroke-width="5" stroke-linecap="round" fill="none"/>
       <path d="M602 316 L626 332 L602 348" stroke="#1A738C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  

    <g>
      <rect x="616" y="250" width="198" height="180" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
      <circle cx="664" cy="298" r="28" fill="url(#badge)"/>
      <text x="664" y="307" text-anchor="middle" class="badge">03</text>
      <text x="644" y="352" class="blockTitle">Service response</text>
      <foreignObject x="644" y="368" width="142" height="54">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:13px;line-height:1.35;color:#4a6070;">Teams prioritise action using clearer signals.</div>
      </foreignObject>
      <path d="M806 332 C 834 332, 846 332, 868 332" stroke="#1A738C" stroke-width="5" stroke-linecap="round" fill="none"/>
       <path d="M862 316 L886 332 L862 348" stroke="#1A738C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  

    <g>
      <rect x="876" y="250" width="198" height="180" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
      <circle cx="924" cy="298" r="28" fill="url(#badge)"/>
      <text x="924" y="307" text-anchor="middle" class="badge">04</text>
      <text x="904" y="352" class="blockTitle">Trust loop</text>
      <foreignObject x="904" y="368" width="142" height="54">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:13px;line-height:1.35;color:#4a6070;">Monitoring and feedback improve public confidence.</div>
      </foreignObject>
      
    </g>
  

  <rect x="88" y="590" width="1018" height="44" rx="16" fill="#F7FAFC" stroke="#B6D0E9"/>
  <text x="112" y="618" class="note">Source: article-derived conceptual synthesis. This infographic is explanatory, not a statistical dataset or official workflow.</text>
</svg>
