<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Schematic geographic access pathway</title>
  <desc id="desc">Schematic geographic access pathway with remote community, local service point, district coordination and referral service connected through digital support.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef6f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1A738C"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1A738C" flood-opacity="0.13"/>
    </filter>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:33px;font-weight:800;fill:#17324d}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:500;fill:#4a6070}
      .nodeTitle{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:800;fill:#17324d}
      .note{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:700;fill:#607685}
      .route{fill:none;stroke:#1A738C;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow);opacity:.84}
      .feedback{fill:none;stroke:#4480A8;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:10 10;marker-end:url(#arrow);opacity:.55}
      .terrain{fill:none;stroke:#B6D0E9;stroke-width:3;stroke-linecap:round;opacity:.72}
    </style>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1050" cy="125" r="150" fill="#B6D0E9" opacity="0.20"/>
  <circle cx="155" cy="610" r="165" fill="#4480A8" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="58" y="58" width="1084" height="604" rx="30" fill="#ffffff" stroke="#B6D0E9" stroke-width="2"/>
  </g>

  <text x="88" y="116" class="title">Schematic geographic access pathway</text>
  <text x="90" y="150" class="subtitle">A non-cartographic access concept for digital public-healthcare delivery</text>

  <path class="terrain" d="M112 546 C 210 506, 278 555, 374 520 S 566 470, 690 520 S 912 552, 1076 502"/>
  <path class="terrain" d="M118 212 C 246 178, 322 222, 446 196 S 680 150, 826 198 S 1004 240, 1088 196"/>

  <path class="route" d="M370 440 C 388 392, 420 370, 442 350"/>
  <path class="route" d="M600 330 C 626 300, 646 286, 676 278"/>
  <path class="route" d="M824 302 C 856 316, 878 336, 898 366"/>
  <path class="feedback" d="M690 360 C 570 510, 372 568, 252 520"/>

  
    <g>
      <rect x="160" y="410" width="210" height="122" rx="26" fill="#EAF3F7" stroke="#4480A8" stroke-width="2.5"/>
      <circle cx="194" cy="446" r="17" fill="#1A738C"/>
      <text x="222" y="452" class="nodeTitle">Remote user area</text>
      <foreignObject x="184" y="474" width="166" height="44">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:12.5px;line-height:1.32;color:#4a6070;">Where distance or terrain can affect access.</div>
      </foreignObject>
    </g>
  

    <g>
      <rect x="390" y="300" width="210" height="122" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2.5"/>
      <circle cx="424" cy="336" r="17" fill="#1A738C"/>
      <text x="452" y="342" class="nodeTitle">Local service point</text>
      <foreignObject x="414" y="364" width="166" height="44">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:12.5px;line-height:1.32;color:#4a6070;">First service contact or support node.</div>
      </foreignObject>
    </g>
  

    <g>
      <rect x="635" y="240" width="210" height="122" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2.5"/>
      <circle cx="669" cy="276" r="17" fill="#1A738C"/>
      <text x="697" y="282" class="nodeTitle">District coordination</text>
      <foreignObject x="659" y="304" width="166" height="44">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:12.5px;line-height:1.32;color:#4a6070;">Operational visibility and response linkage.</div>
      </foreignObject>
    </g>
  

    <g>
      <rect x="860" y="350" width="210" height="122" rx="26" fill="#ffffff" stroke="#B6D0E9" stroke-width="2.5"/>
      <circle cx="894" cy="386" r="17" fill="#1A738C"/>
      <text x="922" y="392" class="nodeTitle">Referral service</text>
      <foreignObject x="884" y="414" width="166" height="44">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Arial,sans-serif;font-size:12.5px;line-height:1.32;color:#4a6070;">Higher-level service or facility connection.</div>
      </foreignObject>
    </g>
  

  <rect x="88" y="590" width="1018" height="44" rx="16" fill="#F7FAFC" stroke="#B6D0E9"/>
  <text x="112" y="618" class="note">Schematic only: not to scale, not an administrative boundary, and not a source-backed geographic dataset.</text>
</svg>
