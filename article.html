<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article · Drishvara</title>
  <meta name="description" content="A Drishvara article reader." />
  <link rel="icon" type="image/png" href="assets/logo/logo.png" />
  <style>
    :root {
      --bg-1: #08142d;
      --bg-2: #12254a;
      --surface: rgba(255, 255, 255, 0.045);
      --surface-soft: rgba(255, 255, 255, 0.025);
      --border: rgba(255, 255, 255, 0.09);
      --text-main: #f5f1e8;
      --text-soft: #d7deea;
      --text-muted: #aeb9cb;
      --gold: #c9a24a;
      --gold-soft: rgba(201, 162, 74, 0.16);
      --danger-soft: rgba(255, 107, 107, 0.10);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 50% 12%, rgba(201, 162, 74, 0.075), transparent 18%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.04), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    a { color: inherit; }

    .page {
      width: 100%;
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 20px 64px;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 8px 0 30px;
      flex-wrap: wrap;
      font-family: Arial, Helvetica, sans-serif;
    }

    .nav a {
      color: var(--text-soft);
      text-decoration: none;
      font-size: 0.98rem;
      transition: color 0.2s ease;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--gold);
    }

    .article-shell {
      max-width: 1080px;
      margin: 0 auto;
    }

    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      background: radial-gradient(circle, var(--gold-soft) 0%, rgba(201, 162, 74, 0.04) 42%, transparent 72%);
      filter: blur(10px);
      border-radius: 50%;
      z-index: 0;
    }

    .logo {
      position: relative;
      z-index: 1;
      width: 52px;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 8px rgba(201, 162, 74, 0.16));
    }

    .meta {
      text-align: center;
      color: var(--gold);
      font-size: 0.88rem;
      margin: 4px 0 12px;
      letter-spacing: 0.04em;
      font-family: Arial, Helvetica, sans-serif;
    }

    h1 {
      max-width: 980px;
      text-align: center;
      margin: 0 auto 16px;
      font-size: clamp(1.9rem, 3.2vw, 2.8rem);
      line-height: 1.12;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .subtitle {
      text-align: center;
      max-width: 900px;
      margin: 0 auto 24px;
      color: var(--text-soft);
      font-size: 1.04rem;
      line-height: 1.75;
    }

    .divider {
      width: 76px;
      height: 1px;
      margin: 0 auto 26px;
      background: linear-gradient(to right, transparent, rgba(201, 162, 74, 0.95), transparent);
    }

    .article-body {
      max-width: 980px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: clamp(22px, 4vw, 42px);
      backdrop-filter: blur(6px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .article-body > *:first-child {
      margin-top: 0;
    }

    .article-body p,
    .article-body li {
      color: var(--text-muted);
      line-height: 1.86;
      font-size: clamp(1rem, 1.22vw, 1.08rem);
      letter-spacing: 0.004em;
      text-align: justify;
      text-justify: inter-word;
    }

    .article-body p {
      margin: 0 0 19px;
    }

    .article-body ul,
    .article-body ol {
      margin: 0 0 22px 24px;
      padding: 0;
    }

    .article-body h1 {
      font-size: clamp(1.55rem, 2.4vw, 2.05rem) !important;
      line-height: 1.18 !important;
      text-align: left !important;
      margin: 22px 0 14px !important;
    }

    .article-body h2 {
      margin: 30px 0 14px;
      font-size: clamp(1.38rem, 2.5vw, 1.72rem);
      color: var(--text-main);
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .article-body h3 {
      margin: 24px 0 12px;
      font-size: 1.22rem;
      color: var(--text-main);
      line-height: 1.28;
    }

    .article-body blockquote {
      margin: 24px 0;
      padding: 16px 18px;
      border-left: 3px solid rgba(201, 162, 74, 0.65);
      background: rgba(201, 162, 74, 0.045);
      color: var(--text-soft);
      font-style: italic;
      line-height: 1.8;
      border-radius: 8px;
    }

    .article-body img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      display: block;
      margin: 24px auto 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .article-body figure {
      margin: 24px 0;
    }

    .article-body figcaption,
    .article-body .image-credit {
      color: var(--text-muted);
      font-size: 0.86rem;
      line-height: 1.5;
      font-family: Arial, Helvetica, sans-serif;
    }

    .article-body a {
      color: var(--gold);
    }

    .reader-status {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      color: var(--text-muted);
      line-height: 1.8;
      font-family: Arial, Helvetica, sans-serif;
    }

    .reader-status.error {
      background: var(--danger-soft);
      border-color: rgba(255, 107, 107, 0.22);
    }

    .back-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 26px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .back-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.96rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 54px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
      text-align: center;
      font-size: 0.92rem;
      font-family: Arial, Helvetica, sans-serif;
    }

    @media (max-width: 768px) {
      .page {
        padding: 20px 16px 46px;
      }

      .nav {
        gap: 18px;
        padding-bottom: 24px;
      }

      .article-body {
        padding: 22px;
        border-radius: 18px;
      }

      .article-body img {
        max-height: 280px;
        border-radius: 14px;
      }
    }
  
    /* Batch 12E: Article typography final pass */
    .article-shell {
      max-width: 1120px;
    }

    h1#article-title {
      max-width: 980px;
      font-size: clamp(1.78rem, 2.75vw, 2.55rem);
      line-height: 1.14;
      font-weight: 650;
      letter-spacing: -0.018em;
      margin-bottom: 14px;
    }

    .subtitle {
      max-width: 900px;
      font-size: 1rem;
      line-height: 1.68;
      margin-bottom: 22px;
    }

    .article-body {
      max-width: 1040px;
      padding: clamp(28px, 4vw, 48px);
      border-radius: 20px;
    }

    .article-body p,
    .article-body li {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(1rem, 1.08vw, 1.065rem);
      line-height: 1.86;
      text-align: justify;
      text-justify: inter-word;
      hyphens: auto;
    }

    .article-body h1,
    .article-body h2,
    .article-body h3,
    .article-body blockquote,
    .article-body ul,
    .article-body ol {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .article-body h2 {
      font-size: clamp(1.28rem, 2vw, 1.58rem);
      line-height: 1.28;
      margin-top: 30px;
    }

    .article-body h3 {
      font-size: clamp(1.12rem, 1.6vw, 1.28rem);
      line-height: 1.32;
    }

    .article-body .reader-featured-image,
    .article-body figure {
      max-width: 980px;
      margin: 22px auto 30px;
    }

    .article-body img {
      max-height: 340px;
      object-fit: cover;
      border-radius: 16px;
    }

    .article-body figcaption,
    .article-body .image-credit {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      font-size: 0.82rem;
    }

    @media (max-width: 768px) {
      h1#article-title {
        font-size: clamp(1.62rem, 7vw, 2.15rem);
        line-height: 1.16;
      }

      .article-body {
        padding: 22px;
      }

      .article-body p,
      .article-body li {
        text-align: left;
        line-height: 1.78;
      }

      .article-body img {
        max-height: 280px;
      }
    }

  </style>

<body>
  <div class="page">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="insights.html">Insights</a>
      <a href="submissions.html">Submissions</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="contact.html">Contact</a>
    </nav>

    <main class="article-shell">
      <div style="text-align:center;">
        <div class="logo-wrap">
          <img src="assets/logo/logo.png" alt="Drishvara Logo" class="logo" />
        </div>
      </div>

      <div class="meta" id="article-meta">Drishvara Article</div>

      <h1 id="article-title">Loading article...</h1>

      <div class="subtitle" id="article-subtitle">
        Please wait while Drishvara opens this read.
      </div>

      <div class="divider"></div>

      <article class="article-body" id="article-body">
        <div class="reader-status">Loading article content...</div>
      </article>

      <div class="back-row">
        <a href="index.html" class="back-link">← Back to Home</a>
        <a href="insights.html" class="back-link">Open Insights</a>
      </div>
    </main>

    <footer>
      Drishvara © 2026 · Article reader
    </footer>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function stripHtml(value) {
      const tmp = document.createElement("div");
      tmp.innerHTML = value || "";
      return (tmp.textContent || tmp.innerText || "").replace(/\s+/g, " ").trim();
    }

    function slugToTitle(value) {
      return String(value || "Drishvara Article")
        .replace(/\.html$/i, "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (m) => m.toUpperCase());
    }

    function normalizeTag(value) {
      const map = {
        media: "Media & Society",
        policy: "Public Programmes",
        spiritual: "Spirituality",
        sports: "Sports",
        world: "World Affairs",
        daily: "Daily Candidate",
        drafts: "Draft",
        "daily-context": "Daily Context"
      };
      return map[value] || slugToTitle(value || "Drishvara");
    }

    function safePath(raw) {
      const value = decodeURIComponent(String(raw || "")).trim();

      if (!value) return "";
      if (value.includes("..")) return "";
      if (value.startsWith("/") || value.startsWith("http://") || value.startsWith("https://")) return "";
      if (!value.startsWith("articles/") && !value.startsWith("generated/")) return "";

      return value;
    }


    function currentContentLanguage() {
      try {
        return localStorage.getItem("drishvara_site_language") || "en";
      } catch {
        return "en";
      }
    }

    function localizedField(item, key, fallback = "") {
      if (!item || typeof item !== "object") return fallback;
      const lang = currentContentLanguage();
      const localizedKey = lang === "hi" ? `${key}_hi` : key;
      return item[localizedKey] || item[key] || fallback;
    }


    function updateArticleSeo(title, subtitle, path, image) {
      const url = path
        ? `https://www.drishvara.com/article.html?path=${encodeURIComponent(path)}`
        : window.location.href;

      const imageUrl = image || "https://www.drishvara.com/assets/logo/logo.png";

      if (window.DrishvaraSEO) {
        window.DrishvaraSEO.setPageMeta({
          title: `${title || "Article"} · Drishvara`,
          description: subtitle || "A Drishvara article.",
          url,
          image: imageUrl,
          type: "article"
        });
      }
    }

    function setReader(title, subtitle, meta, bodyHtml) {
      document.getElementById("article-title").textContent = title || "Drishvara Article";
      document.getElementById("article-subtitle").textContent = subtitle || "A Drishvara read.";
      document.getElementById("article-meta").textContent = meta || "Drishvara Article";
      document.getElementById("article-body").innerHTML = bodyHtml || '<div class="reader-status">No article body available.</div>';
      document.title = `${title || "Article"} · Drishvara`;
    }

    function showError(message, detail = "") {
      setReader(
        "Article not available",
        "The requested Drishvara read could not be opened.",
        "Reader Notice",
        `<div class="reader-status error">
          <strong>${escapeHtml(message)}</strong>
          ${detail ? `<br>${escapeHtml(detail)}` : ""}
          <br><br>
          Return to the homepage or insights page and open another read.
        </div>`
      );
    }

    function cleanImportedArticle(node) {
      if (!node) return "";

      const clone = node.cloneNode(true);

      clone.querySelectorAll([
        "script",
        "style",
        "nav",
        "footer",
        ".nav",
        ".back-row",
        ".logo-wrap",
        ".site-language-control",
        "[data-site-language-control]",
        ".drishvara-lang-control"
      ].join(",")).forEach((el) => el.remove());

      clone.querySelectorAll("h1").forEach((el, index) => {
        if (index === 0) el.remove();
      });

      clone.querySelectorAll(".subtitle, .divider").forEach((el) => {
        const text = (el.textContent || "").trim();
        if (text.length < 280) el.remove();
      });

      clone.querySelectorAll(".meta").forEach((el) => {
        const text = (el.textContent || "").trim();
        if (text.length < 120) el.remove();
      });

      return clone.innerHTML;
    }

    function extractHtmlArticle(html, fallbackPath) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      const title =
        doc.querySelector("h1")?.textContent?.trim() ||
        doc.querySelector("title")?.textContent?.replace("· Drishvara", "").trim() ||
        slugToTitle(fallbackPath.split("/").pop());

      const desc =
        doc.querySelector('meta[name="description"]')?.getAttribute("content") ||
        doc.querySelector(".subtitle")?.textContent?.trim() ||
        doc.querySelector("p")?.textContent?.trim() ||
        "A Drishvara read from the published article archive.";

      const parts = fallbackPath.split("/");
      const section = parts.length >= 2 ? parts[1] : "articles";
      const meta = `${normalizeTag(section)} · Published Read`;

      const featuredImage =
        doc.querySelector(".hero img") ||
        doc.querySelector(".hero-image img") ||
        doc.querySelector("figure img") ||
        doc.querySelector("main img") ||
        doc.querySelector("article img") ||
        doc.querySelector("img");

      const imageCredit =
        doc.querySelector("figcaption")?.textContent?.trim() ||
        doc.querySelector(".image-credit")?.textContent?.trim() ||
        "";

      let bodyCandidate =
        doc.querySelector(".article-body") ||
        doc.querySelector("article") ||
        doc.querySelector("main") ||
        doc.body;

      let bodyHtml = cleanImportedArticle(bodyCandidate);

      if (featuredImage && !bodyHtml.includes("<img")) {
        const imageSrc = featuredImage.getAttribute("src") || "";
        const imageAlt = featuredImage.getAttribute("alt") || title;
        const imageBlock = `
          <figure class="reader-featured-image">
            <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(imageAlt)}" loading="lazy" />
            ${imageCredit ? `<figcaption>${escapeHtml(imageCredit)}</figcaption>` : ""}
          </figure>
        `;
        bodyHtml = imageBlock + bodyHtml;
      }

      if (!stripHtml(bodyHtml)) {
        bodyHtml = `<p>${escapeHtml(desc)}</p>`;
      }

      return { title, desc, meta, bodyHtml };
    }

    function extractJsonArticle(json, fallbackPath) {
      const title = localizedField(json, "title",
        json.headline ||
        json.articleTitle ||
        json.name ||
        slugToTitle(fallbackPath.split("/").pop()));

      const desc = localizedField(json, "summary",
        json.description ||
        json.dek ||
        json.excerpt ||
        json.intro ||
        "A generated Drishvara draft or candidate.");

      const body =
        json.body ||
        json.content ||
        json.article ||
        json.text ||
        json.markdown ||
        "";

      const date =
        json.date ||
        json.publishedAt ||
        json.createdAt ||
        fallbackPath.match(/\d{4}-\d{2}-\d{2}/)?.[0] ||
        "";

      const section = fallbackPath.split("/")[1] || "generated";
      const meta = `${normalizeTag(section)}${date ? ` · ${date}` : ""}`;

      let bodyHtml = "";

      if (Array.isArray(body)) {
        bodyHtml = body.map((p) => `<p>${escapeHtml(p)}</p>`).join("");
      } else if (typeof body === "string" && body.trim()) {
        if (body.includes("<p") || body.includes("<h2") || body.includes("<article")) {
          bodyHtml = body;
        } else {
          bodyHtml = body
            .split(/\n{2,}/)
            .filter(Boolean)
            .map((p) => `<p>${escapeHtml(p.trim())}</p>`)
            .join("");
        }
      }

      if (!bodyHtml) {
        bodyHtml = `<p>${escapeHtml(desc)}</p><blockquote>This item is available as indexed pipeline metadata. Full body content will depend on the publishing stage used for this file.</blockquote>`;
      }

      return { title, desc, meta, bodyHtml };
    }

    async function resolvePathFromIndex() {
      const requestedPath = safePath(params.get("path"));
      if (requestedPath) return requestedPath;

      const folder = params.get("folder");
      const source = params.get("source");

      if (!folder) return "";

      try {
        const response = await fetch("data/article-index.json", { cache: "no-store" });
        if (!response.ok) return "";

        const indexData = await response.json();
        const items = Array.isArray(indexData.items) ? indexData.items : [];
        const match = items.find((item) => {
          if (source && item.source !== source) return false;
          return item.folder === folder || item.sourcePath?.endsWith(`/${folder}.html`) || item.sourcePath?.includes(folder);
        });

        return safePath(match?.path || match?.sourcePath || "");
      } catch {
        return "";
      }
    }



    async function findHindiBodyForPath(path) {
      if (currentContentLanguage() !== "hi") return null;

      try {
        const response = await fetch("data/i18n/article-body-hi.json", { cache: "no-store" });
        if (!response.ok) return null;

        const data = await response.json();
        const items = Array.isArray(data.items) ? data.items : [];

        const match = items.find((item) => {
          if (!item || item.status !== "approved") return false;
          return item.path === path || item.sourcePath === path || item.article_path === path;
        });

        if (!match || !match.article_html_hi) return null;

        return {
          title_hi: match.title_hi || "",
          summary_hi: match.summary_hi || "",
          article_html_hi: match.article_html_hi,
          meta_hi: match.meta_hi || "दृश्वर लेख"
        };
      } catch {
        return null;
      }
    }

    async function findIndexItemForPath(path) {
      try {
        const response = await fetch("data/article-index.json", { cache: "no-store" });
        if (!response.ok) return null;

        const indexData = await response.json();
        const items = Array.isArray(indexData.items) ? indexData.items : [];

        return items.find((item) => {
          return item.path === path || item.sourcePath === path || item.directUrl === path;
        }) || null;
      } catch {
        return null;
      }
    }


    function isUsableReaderImage(src) {
      const low = String(src || "").toLowerCase();
      if (!low) return false;
      if (low.includes("logo")) return false;
      if (low.includes("favicon")) return false;
      if (low.includes("/icon")) return false;
      if (low.includes("data:image")) return false;
      return true;
    }

    function applyReaderHeroImage(bodyHtml, image, title) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = bodyHtml || "";

      wrapper.querySelectorAll("img").forEach((img) => {
        const src = img.getAttribute("src") || "";
        if (!isUsableReaderImage(src)) {
          const figure = img.closest("figure");
          if (figure) figure.remove();
          else img.remove();
        }
      });

      const hasUsableImage = Array.from(wrapper.querySelectorAll("img"))
        .some((img) => isUsableReaderImage(img.getAttribute("src")));

      if (!hasUsableImage && isUsableReaderImage(image)) {
        const figure = document.createElement("figure");
        figure.className = "reader-featured-image";
        figure.innerHTML = `
          <img src="${escapeHtml(image)}" alt="${escapeHtml(title || "Drishvara read")}" loading="lazy" />
        `;
        wrapper.prepend(figure);
      }

      return wrapper.innerHTML;
    }

    async function loadArticle() {
      const path = await resolvePathFromIndex();

      if (!path) {
        showError("No valid article path was supplied.", "Use article.html?path=articles/spiritual/how-attention-becomes-worship.html");
        return;
      }

      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`Unable to fetch ${path}`);

        if (path.endsWith(".json")) {
          const json = await response.json();
          const article = extractJsonArticle(json, path);
          const indexItem = await findIndexItemForPath(path);
          const hindiBody = await findHindiBodyForPath(path);

          const displayTitle = hindiBody?.title_hi || localizedField(indexItem, "title", article.title);
          const displayBody = hindiBody?.article_html_hi || applyReaderHeroImage(article.bodyHtml, indexItem?.image, displayTitle);

          const displaySubtitle = hindiBody?.summary_hi || localizedField(indexItem, "summary", article.desc);

          setReader(
            displayTitle,
            displaySubtitle,
            hindiBody?.meta_hi || article.meta,
            displayBody
          );

          updateArticleSeo(displayTitle, displaySubtitle, path, indexItem?.image);
          return;
        }

        const html = await response.text();
        const article = extractHtmlArticle(html, path);
        const indexItem = await findIndexItemForPath(path);
        const hindiBody = await findHindiBodyForPath(path);

        const displayTitle = hindiBody?.title_hi || localizedField(indexItem, "title", article.title);
        const displayBody = hindiBody?.article_html_hi || applyReaderHeroImage(article.bodyHtml, indexItem?.image, displayTitle);

        const displaySubtitle = hindiBody?.summary_hi || localizedField(indexItem, "summary", article.desc);

        setReader(
          displayTitle,
          displaySubtitle,
          hindiBody?.meta_hi || article.meta,
          displayBody
        );

        updateArticleSeo(displayTitle, displaySubtitle, path, indexItem?.image);
      } catch (error) {
        showError("Article file could not be loaded.", error.message || String(error));
      }
    }

    loadArticle();
  </script>
  <script src="/assets/js/seo-runtime.js" defer></script>
  <script src="/assets/js/site-language.js" defer></script>
  <script src="assets/js/language-state-guard.js" defer></script>
</body>
