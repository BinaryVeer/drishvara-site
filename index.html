<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drishvara</title>
  <meta name="description" content="Drishvara — a founder-led insight platform." />
  <style>
    :root {
      --bg-1: #08142d;
      --bg-2: #12254a;
      --text-main: #f5f1e8;
      --text-soft: #d7deea;
      --text-muted: #9aa8bc;
      --gold: #c9a24a;
      --gold-soft: rgba(201, 162, 74, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 50% 22%, rgba(201, 162, 74, 0.08), transparent 18%),
        radial-gradient(circle at 85% 15%, rgba(255, 255, 255, 0.04), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow-x: hidden;
    }

    .box {
      width: 100%;
      max-width: 920px;
      padding: 34px 24px 56px;
    }

    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, var(--gold-soft) 0%, rgba(201, 162, 74, 0.04) 42%, transparent 72%);
      filter: blur(10px);
      border-radius: 50%;
      z-index: 0;
    }

    .logo {
      position: relative;
      z-index: 1;
      width: 104px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 8px rgba(201, 162, 74, 0.18));
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(3.4rem, 6.2vw, 5rem);
      font-weight: 600;
      letter-spacing: 0.2px;
      line-height: 0.98;
      color: var(--text-main);
    }

    .tagline {
      margin-bottom: 18px;
      font-size: clamp(1.2rem, 2.1vw, 1.55rem);
      color: var(--text-soft);
      font-weight: 500;
      letter-spacing: 0.1px;
    }

    .sub {
      max-width: 780px;
      margin: 0 auto 28px;
      font-size: 1.06rem;
      color: var(--text-muted);
      line-height: 1.85;
    }

    .divider {
      width: 82px;
      height: 1px;
      margin: 0 auto 26px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(201, 162, 74, 0.95),
        transparent
      );
    }

    .verse-block {
      max-width: 760px;
      margin: 0 auto;
    }

    .verse {
      font-size: clamp(1.6rem, 2.7vw, 2rem);
      color: var(--text-main);
      line-height: 1.75;
      margin-bottom: 8px;
    }

    .translit {
      font-size: 1.06rem;
      color: var(--text-soft);
      font-style: italic;
      line-height: 1.75;
      margin-bottom: 8px;
    }

    .meaning {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      .box {
        padding: 28px 18px 44px;
      }

      .logo {
        width: 88px;
      }

      .logo-wrap::before {
        width: 150px;
        height: 150px;
      }

      .sub {
        font-size: 1rem;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo-wrap">
      <img src="assets/logo/logo.png" alt="Drishvara Logo" class="logo" />
    </div>

    <h1>Drishvara</h1>

    <div class="tagline">Vision. Reflection. Insight.</div>

    <div class="sub">
      A founder-led insight platform taking shape.<br />
      Spirituality, sports, world affairs, media, and public programmes — viewed with depth and clarity.
    </div>

    <div class="divider"></div>

    <div class="verse-block">
      <div class="verse">दृष्टिर्विस्तीर्णा, मननं गम्भीरम्।</div>
      <div class="translit">dṛṣṭiḥ vistīrṇā, mananaṃ gambhīram.</div>
      <div class="meaning">Vision broad, reflection deep.</div>
    </div>
  </div>
</body>
</html>
