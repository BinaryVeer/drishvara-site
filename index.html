<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drishvara</title>
  <meta name="description" content="Drishvara — a founder-led insight platform." />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .box {
      max-width: 860px;
      padding: 40px 20px;
    }
    .logo {
    width: 120px;
    margin-bottom: 20px;
    }
    h1 {
      font-size: 3.2rem;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .tagline {
      font-size: 1.25rem;
      color: #cbd5e1;
      margin-bottom: 18px;
    }
    .sub {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.8;
      margin-bottom: 28px;
    }
    .verse {
      font-size: 1.35rem;
      color: #f8fafc;
      margin-bottom: 10px;
      line-height: 1.8;
    }
    .translit {
      font-size: 1rem;
      color: #cbd5e1;
      font-style: italic;
      margin-bottom: 10px;
    }
    .meaning {
      font-size: 0.98rem;
      color: #94a3b8;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="assets/logo/logo.png" alt="Drishvara Logo" class="logo">
    <h1>Drishvara</h1>
    <div class="tagline">Vision. Reflection. Insight.</div>
    <div class="sub">
      A founder-led insight platform taking shape.<br />
      Spirituality, sports, world affairs, media, and public programmes — viewed with depth and clarity.
    </div>

    <div class="verse">दृष्टिर्विस्तीर्णा, मननं गम्भीरम्।</div>
    <div class="translit">dṛṣṭir vistīrṇā, mananaṃ gambhīram.</div>
    <div class="meaning">Vision broad, reflection deep.</div>
  </div>
</body>
</html>
